<app-auth-card [title]="'auth.signin.title' | translate" [description]="'auth.signin.description' | translate">
  <div
    class="relative md:bg-white rounded-lg md:shadow-md md:shadow-slate-900/5 md:border border-slate-200/50 overflow-hidden">
    <div class="h-2 bg-linear-to-r from-primary-500 via-primary-600 to-primary-700"></div>
    <div class="py-8 md:px-10">
      <div class="mb-8">
        <p class="text-sm text-slate-600">
          {{ 'auth.signin.noAccount' | translate }}
          <a
            class="ml-1 font-semibold text-primary-600 hover:text-primary-700 transition-colors duration-200 hover:underline"
            [routerLink]="['/sign-up']">
            {{ 'auth.signin.signUpLink' | translate }}
          </a>
        </p>
      </div>
      <form [formGroup]="form" class="space-y-4 md:space-y-6" (ngSubmit)="onSignIn()">
        <app-form-manager [form]="form" [loading]="store.isLoading()" [showProgress]="false">
          <div class="group">
            <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">
              {{ 'auth.signin.form.email' | translate }}
            </label>
            <input
              id="email"
              type="email"
              formControlName="email"
              [placeholder]="'auth.signin.form.emailPlaceholder' | translate"
              class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-primary-400 focus:ring-4 focus:ring-primary-100" />
          </div>
          <div class="group">
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">
              {{ 'auth.signin.form.password' | translate }}
            </label>
            <div class="flex overflow-hidden rounded-lg border border-slate-200 bg-white">
              <input
                id="password"
                [type]="showPassword() ? 'text' : 'password'"
                formControlName="password"
                [placeholder]="'auth.signin.form.passwordPlaceholder' | translate"
                class="w-full px-4 py-3 text-sm text-slate-900 outline-none" />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="inline-flex items-center justify-center px-4 text-slate-500 transition hover:bg-slate-50 hover:text-slate-900">
                <i-lucide [name]="showPassword() ? icons.eyeOff : icons.eye" class="size-4" />
              </button>
            </div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-slate-600">{{ 'auth.signin.forgotPassword' | translate }}</span>
            <a
              class="font-semibold text-primary-600 hover:text-primary-700 transition-colors duration-200 hover:underline"
              [routerLink]="['/forgot-password']">
              {{ 'auth.signin.resetLink' | translate }}
            </a>
          </div>
          <ui-button
            class="group"
            [fullWidth]="true"
            [loading]="store.isLoading()"
            [disabled]="store.isLoading() || form.invalid"
            type="submit">
            <span class="flex items-center justify-center gap-2">
              <span>{{ 'auth.signin.form.submit' | translate }}</span>
            </span>
          </ui-button>
          <div class="flex items-center">
            <div class="flex-auto border-t border-slate-200"></div>
            <div class="text-sm text-slate-600 mx-4 my-4">{{ 'auth.signin.orContinueWith' | translate }}</div>
            <div class="flex-auto border-t border-slate-200"></div>
          </div>
          <ui-button [fullWidth]="true" variant="secondary" type="button" (click)="signinWithGoogle()">
            <div class="relative h-5 w-5">
              <img ngSrc="/images/google.svg" alt="Google" fill />
            </div>
            <span class="-ml-2">oogle</span>
          </ui-button>
        </app-form-manager>
      </form>
    </div>
  </div>
</app-auth-card>
